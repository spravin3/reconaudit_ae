version: 2

models:
  - name: stg_client_events
    description: >
      Deduplicated, flattened client event stream.
      4,904 unique records after removing 605 duplicate page_view event_ids.
    columns:
      - name: event_id
        description: Unique client event identifier.
        tests:
          - unique
          - not_null

      - name: event_timestamp
        description: UTC timestamp of the client event.
        tests:
          - not_null

      - name: user_id
        description: Anonymous user identifier.
        tests:
          - not_null

      - name: event_name
        description: Type of client event.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['page_view', 'add_to_cart', 'purchase_intent']

      - name: intent_value
        description: >
          Purchase value in USD. Non-null only for purchase_intent events.
          All other event types should have this null.

  - name: stg_server_logs
    description: >
      Deduplicated server transaction ledger. 928 records, no source duplicates.
    columns:
      - name: tx_id
        description: Unique server transaction identifier.
        tests:
          - unique
          - not_null

      - name: tx_timestamp
        description: UTC timestamp of the transaction attempt.
        tests:
          - not_null

      - name: user_id
        description: User who initiated the transaction.
        tests:
          - not_null

      - name: status
        description: Transaction outcome.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['completed', 'failed']

      - name: amount
        description: Transaction amount in USD.
        tests:
          - not_null
